name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test # tsc + node:test (parseBbox/computeFlags/capturedAt — DB 불필요)

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      # glob 고정 — 파일을 나열하면 새 테스트가 CI에서 조용히 빠진다(실제로 courseProgress·hikeWidget·mountainSets 3개가 누락돼 있었음).
      # 테스트가 소스(.ts)를 직접 import하므로 Node ≥22.18(타입 스트리핑 기본)이 필요하다.
      - run: node --test 'src/lib/*.test.js'
